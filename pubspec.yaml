name: nexalens
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  camera: ^0.11.2
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_translation: ^0.13.1
  http: ^1.2.0
  permission_handler: ^11.3.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  share_plus: ^10.1.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
